<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Primary -->
		<meta name="author" content="Trian Damai" />
		<meta name="theme-color" content="#08060D" />

		<!-- Open Graph -->
		<meta property="og:type"        content="website" />
		<meta property="og:site_name"   content="Trian Damai" />
		<meta property="og:title"       content="Trian Damai — Portfolio" />
		<meta property="og:description" content="Software engineer from East Kalimantan — SvelteKit, Android, Kotlin, TypeScript." />
		<meta property="og:image"       content="https://trian.space/og-image.svg" />
		<meta property="og:image:width"  content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:url"         content="https://trian.space" />

		<!-- Twitter / X -->
		<meta name="twitter:card"        content="summary_large_image" />
		<meta name="twitter:title"       content="Trian Damai — Portfolio" />
		<meta name="twitter:description" content="Software engineer from East Kalimantan — SvelteKit, Android, Kotlin, TypeScript." />
		<meta name="twitter:image"       content="https://trian.space/og-image.svg" />

		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/favicon.svg" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
